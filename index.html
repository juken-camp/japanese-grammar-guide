<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>中学国語文法辞典</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans JP',sans-serif;background:#FAF9F6;color:#1a1a1a}

#app{max-width:520px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Header */
.home-hdr{background:linear-gradient(135deg,#1B2631,#2C3E50);padding:22px 16px 16px;color:#fff}
.logo-row{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.logo-icon{font-size:32px}
.app-title{font-size:19px;font-weight:800;letter-spacing:.5px}
.app-sub{font-size:11.5px;opacity:.75;margin-top:3px}
.badges{display:flex;gap:8px}
.badge{background:rgba(255,255,255,.12);padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600}

.hdr{background:linear-gradient(135deg,#1B2631,#2C3E50);padding:13px 16px;color:#fff;display:flex;align-items:center;gap:12px}
.back-btn{background:rgba(255,255,255,.12);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit}
.hdr-title{font-size:15px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Scroll area */
.scroll{flex:1;overflow-y:auto;padding:12px 14px 28px;-webkit-overflow-scrolling:touch}

/* Search */
.search-box{display:flex;align-items:center;background:#fff;border-radius:12px;padding:11px 14px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);gap:8px;border:1px solid #E8E4DC}
.search-box input{border:none;outline:none;flex:1;font-size:14px;font-family:inherit;background:transparent;color:#1a1a1a}
.clear-btn{background:none;border:none;font-size:15px;cursor:pointer;color:#999;padding:0 2px}

/* Category cards */
.cat-card{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #EDE9E3;border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;width:100%;text-align:left;font-family:inherit;transition:transform .1s}
.cat-card:active{transform:scale(.98)}
.cat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:1.5px solid;flex-shrink:0;font-size:20px}
.cat-name{font-size:14px;font-weight:700;color:#1a1a1a}
.cat-sub{font-size:11px;color:#999;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chev{font-size:20px;color:#CCC;font-weight:300;flex-shrink:0}

/* Topic list */
.topic-card{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #EDE9E3;border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;width:100%;text-align:left;font-family:inherit;transition:transform .1s}
.topic-card:active{transform:scale(.98)}
.topic-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.topic-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0}
.topic-title{font-size:14px;font-weight:700;color:#1a1a1a}
.topic-sum{font-size:12px;color:#888;margin-top:2px}

/* Search results */
.sr-card{display:flex;align-items:flex-start;gap:12px;background:#fff;border:1px solid #EDE9E3;border-radius:10px;padding:13px 14px;margin-bottom:7px;cursor:pointer;width:100%;text-align:left;font-family:inherit}

/* Topic detail */
.topic-header{border-radius:12px;padding:14px 16px;margin-bottom:8px}
.topic-h-name{font-size:17px;font-weight:800;color:#1a1a1a;margin-bottom:4px}
.topic-h-sum{font-size:13px;color:#666}

/* Tables */
.tbl-title{font-size:13px;font-weight:700;color:#444;padding:8px 0 2px 2px}
.tbl-wrap{overflow-x:auto;margin:10px 0;-webkit-overflow-scrolling:touch}
.tbl-wrap table{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl-wrap th{color:#fff;padding:8px;text-align:left;font-weight:700;font-size:11.5px;white-space:nowrap}
.tbl-wrap td{padding:7px 8px;border-bottom:1px solid #EDE9E3;line-height:1.5;vertical-align:top}
.tbl-wrap tr:nth-child(even){background:#FAFAF7}
.tbl-wrap tr:nth-child(odd){background:#fff}

/* Explanation area */
.exp-card{background:#fff;border-radius:14px;padding:18px 15px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);line-height:1.85}

/* Line types */
.line-sec{font-size:14px;font-weight:800;color:#1B2631;padding:14px 0 6px;border-bottom:2px solid #E8E4DC;margin-bottom:6px}
.line-nrm{font-size:13.5px;color:#333;padding:2px 0}
.line-arw{font-size:13px;color:#555;padding-left:14px}
.line-ex{font-size:13px;color:#2471A3;padding-left:14px;line-height:1.7}
.line-ng{font-size:13px;color:#C0392B;padding-left:6px}
.line-ok{font-size:13px;color:#1E8449;padding-left:6px}
.line-spacer{height:10px}

/* Cards */
.card-goal{background:linear-gradient(135deg,#EBF5FB,#E8F8F5);border:1px solid #A3E4D7;border-radius:10px;padding:11px 13px;margin:8px 0;display:flex;align-items:flex-start;gap:8px}
.card-goal .icon{font-size:15px;flex-shrink:0}
.card-goal .text{font-size:13.5px;font-weight:600;color:#1a6e5c;line-height:1.6}

.card-point{background:#EBF5FB;border:1px solid #AED6F1;border-radius:10px;padding:11px 13px;margin:8px 0}
.card-point .head{font-weight:700;font-size:12px;color:#2471A3;margin-bottom:3px}
.card-point .body{font-size:13px;color:#1a1a1a;line-height:1.7}

.card-warn{background:#FFF5F5;border:1px solid #F5B7B1;border-radius:10px;padding:11px 13px;margin:8px 0}
.card-warn .head{font-weight:700;font-size:12px;color:#C0392B;margin-bottom:3px}
.card-warn .body{font-size:13px;color:#1a1a1a;line-height:1.7}

.card-key{background:#FEF9E7;border:1px solid #F9E79F;border-radius:8px;padding:9px 13px;margin:6px 0;font-size:13.5px;font-weight:700;color:#7D6608;line-height:1.6}

.card-rule{background:#F4ECF7;border:1px solid #D2B4DE;border-radius:10px;padding:11px 13px;margin:8px 0}
.card-rule .head{font-weight:700;font-size:12px;color:#7D3C98;margin-bottom:3px}
.card-rule .body{font-size:13px;color:#1a1a1a;line-height:1.7}

.card-step{display:flex;align-items:flex-start;gap:8px;margin:5px 0;padding:2px 0}
.card-step .badge{background:#2C3E50;color:#fff;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:1px}
.card-step .stxt{font-size:13px;color:#333;line-height:1.6}

.card-warn2{font-size:13px;font-weight:700;color:#C0392B;padding:6px 10px;background:#FFF5F5;border-radius:8px;margin:4px 0;line-height:1.7}

/* Nav buttons */
.nav-row{display:flex;justify-content:space-between;gap:8px;margin-bottom:16px}
.nav-btn{background:#fff;border:1px solid #DDD;border-radius:10px;padding:10px 14px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;color:#555;max-width:48%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:transform .1s}
.nav-btn:active{transform:scale(.97)}

/* Footer */
.footer{text-align:center;padding:24px 0 8px}
.footer-title{font-size:14px;font-weight:700;color:#999}
.footer-sub{font-size:11px;color:#BBB;margin-top:4px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const D = {"言葉の単位":{"icon":"📦","color":"#FF6B6B","topics":{"文章・段落・文・文節・単語":{"summary":"言葉を大きさで分ける5つの単位","tables":[{"title":"📐 5つの単位","headers":["単位","意味","見分け方"],"color":"#FF6B6B","rows":[["文章","段落の集まり","作文全体"],["段落","文の集まり","一マス下げ"],["文","言い切り","「。」で終わる"],["文節","意味がわかるまとまり","「ネ」で区切る"],["単語","最小の単位","これ以上分けられない"]]}],"explanation":"━━━ そもそもこの単元って何？ ━━━\n\n🎯GOAL:日本語の言葉を「大きさの順番」で分ける方法を覚えましょう。文法の土台になる、一番最初の単元です。\n\n「言葉の単位」と聞くと難しそうですよね。でもやることはすごくシンプルで、ふだん使っている文を、大きいかたまりから小さいかたまりへ順番に分けていくだけです。\n\nみなさんの住所を思い浮かべてください。「沖縄県 → 那覇市 → ○○町 → ○番地」って、大きい単位から小さい単位に分かれていますよね。日本語の文もまったく同じで、大きい単位から小さい単位に分けることができるんです。\n\nなぜこれを最初に学ぶかというと、このあと出てくる「品詞」や「活用」は、言葉を一番小さい単位（単語）に分けられないと始まらないからです。ここは文法の入り口。ここさえわかれば、あとの単元がスムーズに進みます。\n\n━━━ テストではどう出る？ ━━━\n\n「この文を文節に分けなさい」「単語に分けなさい」がド定番です。やり方さえ知っていれば確実に点が取れる、おいしい問題です。\n\n━━━ 5つの単位をイメージしよう ━━━\n\n言葉の単位は5つあります。大きい順にケーキで例えてみましょう。\n\nホールケーキ全体 ＝ 文章（一番大きい）\nケーキを切ったピース ＝ 段落\nピースにのったイチゴ ＝ 文\nイチゴの中のタネ ＝ 文節\nタネを砕いた粉 ＝ 単語（一番小さい）\n\n大きなかたまりをどんどん細かくしていく、というイメージですね。\n\nちなみに「文節」の「節」は竹の「ふし」のことです。竹って節のところでポキッと折れますよね。文も「節」のところで区切れるんです。こう考えると「文節」って名前もなるほどと思いませんか？\n\nこの5つの順番だけはしっかり覚えてください。\n\n🔑KEY:大きい方から 文章 ＞ 段落 ＞ 文 ＞ 文節 ＞ 単語\n\n━━━ 「文」の見分け方 ━━━\n\nまず一番わかりやすい「文」から。\n\n💡POINT:「。」（句点）で終わるまとまりが「文」です。「。」を数えれば文の数がわかります。\n\n例：「今日は晴れだ。だから散歩に行こう。」\n→ 「。」が2つ → 文が2つです。\n\nこれだけです。ものすごくシンプルですよね。\n\n━━━ 文節の分け方（テストに一番出る！） ━━━\n\nここがこの単元で一番大事なところです。\n\n「文節」とは、文を意味のわかるかたまりに分けたものです。でも「どこで区切ればいいの？」って思いますよね。\n\n📝RULE:文に「ネ」を入れて読んでみてください。自然に「ネ」が入るところが文節の区切りです。\n\n実際にやってみましょう。\n\n「私は毎日学校に通っている。」\n\n声に出して「ネ」を入れながら読んでみてください。\n\n「私はネ／毎日ネ／学校にネ／通っているネ」\n\n自然に4か所で「ネ」が入りますよね。つまり4文節です！\n\n逆に「学校」と「に」の間に「ネ」を入れて「学校ネにネ」と読むと…不自然ですよね。だから「学校に」はひとかたまり（1文節）です。\n\nもう1つ練習してみましょう。「大きな犬が公園で走っている。」\n\n「大きなネ／犬がネ／公園でネ／走っているネ」→ 4文節です。\n\n声に出して読むのがコツです。頭の中だけでやるより、声に出したほうが自然・不自然の感覚がつかみやすいですよ。\n\n━━━ 単語の分け方 ━━━\n\n最後に「単語」。これは文節をさらにバラバラにしたものです。これ以上分けたら意味がなくなる、一番小さい単位です。\n\n例：「私は」→「私」＋「は」＝ 2単語\n例：「通っている」→「通っ」＋「て」＋「いる」＝ 3単語\n\n━━━ 文節と単語の違い ━━━\n\n「文節と単語ってどう違うの？」と迷う人が多いので、ここで整理しておきましょう。\n\n文節は「ネ」で区切れるまとまり。つまり「まだいくつかの単語がくっついた状態」です。\n\n単語はその文節をさらにバラバラにしたもの。「もうこれ以上分けられない最小の状態」です。\n\n文節は「ネ」で区切れるまとまり。つまり「まだいくつかの単語がくっついた状態」です。\n\n🔑KEY:文節＝「ネ」で区切れるまとまり\n\n単語はその文節をさらにバラバラにしたもの。「もうこれ以上分けられない最小の状態」です。\n\n🔑KEY:単語＝文節をさらにバラバラにしたもの\n\nテストで「文節に分けよ」なら「ネ」で区切る。「単語に分けよ」なら文節をさらにバラバラにする。この使い分けができればバッチリです。"},"文節どうしの関係":{"summary":"文節のつながり方は5種類","tables":[{"title":"🔗 5つの関係","headers":["関係","意味","例"],"color":"#FF6B6B","rows":[["主語・述語","何が＋どうする","花が｜咲く"],["修飾・被修飾","くわしく説明","赤い｜花"],["接続","つなぎ言葉","しかし"],["独立","他と関係なし","ああ、"],["並立","対等に並ぶ","山や｜川が"]]}],"explanation":"━━━ そもそもこの単元って何？ ━━━\n\n🎯GOAL:文節どうしが「どんな関係でつながっているか」を見分けられるようになりましょう。\n\n前の単元で文を文節に分けましたよね。この単元では「分けた文節どうしは、どういう関係なの？」を学びます。\n\n人間関係にも「親子」「友達」「先輩後輩」「他人」がありますよね。文節にも同じように関係があって、全部で5種類です。テストでは「〇〇と△△の関係を答えなさい」と出ます。\n\n━━━ ① 主語・述語の関係 ━━━\n\n「何が」＋「どうする（どんなだ・何だ）」のセットです。文の骨組みにあたる一番基本の関係です。\n\n例：「花が｜咲く。」→ 「花が」＝何が（主語）、「咲く」＝どうする（述語）\n\n💡POINT:見つけ方のコツは、まず文末の述語を見つけてから「何が？」と聞くことです。「咲く」→何が咲く？→「花が」。述語から逆にたどると見つけやすいですよ。\n\n━━━ ② 修飾・被修飾の関係 ━━━\n\nある文節が別の文節をくわしく説明している関係です。くわしくする側が「修飾語」、される側が「被修飾語」です。\n\n「修飾」の「修」は「ととのえる」、「飾」は「かざる」。つまり「飾りをつけてととのえる」こと。お化粧みたいなものですね。\n\n例：「赤い｜花」→ 「赤い」が「花」を飾っている（くわしくしている）。\n\n見分け方は「どんな？」「どのように？」と聞いてみること。「どんな花？」→「赤い花」。この「赤い」が修飾語です。\n\n━━━ ③ 接続の関係 ━━━\n\n「しかし」「だから」のように前後をつなぐ文節です。これは見ればわかりますよね。\n\n━━━ ④ 独立の関係 ━━━\n\n他の文節と直接つながっていない文節です。\n\n💡POINT:その文節を取り除いても文が通じれば、独立の関係です。\n\n例：「ああ、きれいだ。」→「ああ」を取っても「きれいだ」で通じる→独立です。\n\n━━━ ⑤ 並立の関係 ━━━\n\n対等な関係で横並びになっている文節です。どちらが上でも下でもありません。\n\n例：「山や｜川が｜美しい。」→ 「山や」と「川が」は同じレベルで並んでいます。"},"文の成分":{"summary":"文を作っている5つのパーツ","tables":[{"title":"🧱 5つの成分","headers":["成分","役割","見つけ方"],"color":"#FF6B6B","rows":[["主語","何が・だれが","述語に「何が？」と聞く"],["述語","どうする・どんなだ","文末にある"],["修飾語","くわしく説明","「どんな？」と聞く"],["接続語","前後をつなぐ","「だから」「しかし」等"],["独立語","他と関係なし","取っても文が通じる"]]}],"explanation":"━━━ そもそもこの単元って何？ ━━━\n\n🎯GOAL:文を作っている5つのパーツの名前と役割を覚えましょう。\n\n「文の成分」とは、文を作っている部品のことです。\n\n料理にはいろんな材料がありますよね。カレーなら肉、野菜、ルー、ごはん…。それと同じで、文にも「材料」があるんです。その材料のことを「成分」と呼んでいます。\n\nどんなに長い文でも、どんなに複雑な文でも、使われている材料はたった5種類しかありません。テストでは「下線部は何の成分ですか」と聞かれますが、5つの中から選ぶだけなので、覚えてしまえば確実に点が取れます。\n\n━━━ ① 主語 ━━━\n\n「何が」「だれが」にあたる部分です。\n\n例：「鳥が飛ぶ。」→ 何が飛ぶ？→「鳥が」＝主語\n\n主語を見つけるコツは、先に述語を見つけてから「何が？」と聞くことです。述語から逆にたどると見つけやすいですよ。\n\n━━━ ② 述語 ━━━\n\n「どうする」「どんなだ」「何だ」にあたる部分です。文末に来ることが多いです。\n\n例：「鳥が飛ぶ。」→「飛ぶ」＝述語\n\n述語は文の「結論」のようなものです。主語が「だれ？」で、述語が「で、どうしたの？」。この2つが文の骨組みになっています。\n\n━━━ ③ 修飾語 ━━━\n\n他の部分をくわしく説明する部分です。ここが少しだけ複雑で、2種類あります。\n\n例：「大きな犬が速く走る。」\n\n「大きな」は「犬」（名詞）をくわしくしていますよね。こういう名詞をくわしくする修飾語を「連体修飾語」と言います。\n\n「速く」は「走る」（動詞）をくわしくしていますよね。こういう動詞等をくわしくする修飾語を「連用修飾語」と言います。\n\n名詞をくわしくするのが連体修飾語で、動詞等をくわしくするのが連用修飾語。言い換えると、「どんな？」の答えが連体修飾語、「どのように？」の答えが連用修飾語です。\n\n📝RULE:「どんな？」→名詞をくわしくする→連体修飾語\n\n一方、「どのように走った？」→「速く」のように動詞等をくわしくする修飾語もあります。\n\n📝RULE:「どのように？」→動詞等をくわしくする→連用修飾語\n\n「連体」「連用」ってややこしいですよね。でも名前に意味があって、それを知るとすんなり覚えられます。\n\n「連体」の「体」は「体言」の「体」。体言とは名詞のことでしたよね。つまり「連体」＝「名詞に連なる（つながる）」。名詞につながってくわしくするから「連体修飾語」です。\n\n🔑KEY:連体の「体」＝体言（名詞）\n\n「連用」の「用」は「用言」の「用」。用言とは動詞・形容詞・形容動詞のこと。つまり「連用」＝「用言に連なる」。動詞等につながってくわしくするから「連用修飾語」です。\n\n🔑KEY:連用の「用」＝用言（動詞等）\n\nこの「体」と「用」は文法のいろんなところで出てきます。「連体形」「連用形」にも同じ字が入っています。ここで覚えておくと、あとあとずっとラクになりますよ。\n\n━━━ ④ 接続語 ━━━\n\n前後をつなぐ部分です。「だから」「しかし」「そして」など。\n\n例：「雨が降った。だから傘をさした。」→「だから」＝接続語\n\nつなぎ言葉を見つけたら「これは接続語だな」と判断できます。あまり迷わないと思います。\n\n━━━ ⑤ 独立語 ━━━\n\n他の部分と関係がない、独立した部分です。\n\n例：「ああ、きれいだ。」→「ああ」＝独立語\n\n💡POINT:取り除いても文の意味が通じるかどうかで見分けられます。「ああ」を取っても「きれいだ」で通じますよね。だから独立語です。\n\n「はい」「こんにちは」「おーい」なども独立語になります。\n\n━━━ テストの解き方 ━━━\n\n最後に、テストで「この部分は何の成分？」と聞かれたときの手順をまとめます。\n\nまず述語を見つけましょう。述語は文の結論で、文末にあることが多いです。\n\n次に述語に「何が？」と聞いて主語を探します。\n\n「どんな？」「どのように？」でくわしくしている語があれば修飾語。\n\n「だから」「しかし」などのつなぎ言葉なら接続語。\n\n取り除いても文が通じる語なら独立語。\n\nこの順番で考えれば大丈夫です。"}}},"品詞の分類":{"icon":"🏷️","color":"#4ECDC4","topics":{"品詞の全体像":{"summary":"単語は全部で10種類に分けられる","tables":[{"title":"📋 10品詞一覧","headers":["","品詞","特徴","例"],"color":"#4ECDC4","rows":[["自立語\n活用あり","動詞","動き・存在","走る、食べる"],["","形容詞","〜いで終わる","美しい、高い"],["","形容動詞","〜だで終わる","静かだ、元気だ"],["自立語\n活用なし","名詞","ものの名前","犬、学校"],["","副詞","用言を修飾","とても"],["","連体詞","名詞を修飾","この、大きな"],["","接続詞","文をつなぐ","しかし"],["","感動詞","感動・応答","ああ、はい"],["付属語\n活用あり","助動詞","意味を足す","〜ない、〜た"],["付属語\n活用なし","助詞","関係を示す","が、を、に"]]}],"explanation":"━━━ そもそもこの単元って何？ ━━━\n\n🎯GOAL:日本語のすべての単語を10種類に分類できるようになりましょう。品詞がわかれば文法問題の半分以上が解けます。\n\n「品詞」とは単語の種類分けのことです。この世にある日本語の単語はぜんぶ、必ず10種類のどれかに分けられます。\n\n「品詞」の「品」は「種類」、「詞」は「ことば」。つまり「言葉の種類」です。名前はそのまんまですね。\n\n文法のテストの大半は「この言葉は何の品詞？」と聞いてきます。だから品詞がわかれば文法のテストの半分以上が解けます。文法のボスキャラがこの「品詞」だと思ってください。\n\n━━━ まず大きく2つに分ける ━━━\n\nいきなり10種類を覚えるのは大変ですから、まず2つに分けましょう。\n\nすべての単語は「自立語」と「付属語」に分かれます。\n\n🔑KEY:自立語＝その語だけで意味がわかる語\n\nたとえば「犬」と聞けば動物のことだとわかりますよね。「走る」と聞けば動くことだとわかります。1語だけで「ああ、あのことね」とわかる語が自立語です。\n\n🔑KEY:付属語＝他の語にくっつかないと使えない語\n\n「が」だけ言われても「は？何のこと？」ってなりますよね。「は」だけ、「ない」だけでも同じ。他の語にくっつかないと意味をなさない語が付属語です。\n\n「自立」は「ひとりで立てる」、「付属」は「くっつく」。ひとりで生きていける語か、くっつかないと生きていけない語か。人間の性格みたいで面白いですよね。\n\n━━━ 次に「活用するかしないか」で分ける ━━━\n\n「活用する」とは、場面によって形が変わることです。\n\n「書く」→「書かない」「書きます」「書いた」と形が変わる＝活用する\n「犬」→いつでも「犬」のまま＝活用しない\n\nこの2つの基準（自立語か付属語か × 活用するかしないか）で分けると10種類になります。上の表を見てくださいね。\n\n━━━ 超重要ワード ━━━\n\nここで、このあとの文法でずーーっと出てくる超重要ワードを2つ紹介します。\n\n🔑KEY:用言（ようげん）＝動詞・形容詞・形容動詞のこと\n\n「用」は「はたらき」の意味です。「走る」は動作、「美しい」は性質。はたらきを表す言葉だから「用言」と呼びます。\n\n🔑KEY:体言（たいげん）＝名詞のこと\n\n「体」は「本体・実体」の意味です。「犬」「山」「学校」…名詞はものの本体そのものを指しています。ものの実体を表す言葉だから「体言」です。\n\nこの2つは本当にこのあと何十回も出てきます。ここでしっかり覚えておくと、このあとの学習がグッとラクになりますよ。"},"品詞の見分け方":{"summary":"この順番で考えれば必ず見分けられる","tables":[{"title":"⚠️ ひっかけ注意！","headers":["間違い","正解","理由"],"color":"#E74C3C","rows":[["きれいだ→形容詞","形容動詞","言い切りが「だ」"],["大きな→形容動詞","連体詞","「大きだ」は存在しない"],["は→格助詞","副助詞","主題を示す語"]]}],"explanation":"━━━ そもそもこの単元って何？ ━━━\n\nテストで一番よく出る問題の1つが「下線部の品詞を答えなさい」です。\n\n「そんなの無理…」と思うかもしれませんが、実はレシピどおりに作れば料理ができるのと同じで、決まった手順で考えれば絶対に正解にたどり着けます。\n\n━━━ 品詞の見分け手順 ━━━\n\n次の順番で上から1つずつチェックしてください。\n\n📝RULE:品詞見分けの5ステップ\n\nSTEP1：自立語か付属語か？\n\nその語だけで意味がわかりますか？わかるなら自立語、わからないなら付属語です。もっと簡単に言うと、文節の先頭にある語は自立語、後ろにくっついている小さな語は付属語です。\n\nSTEP2：活用するかしないか？\n\n「ない」をつけてみて形が変わるなら「活用する」。たとえば「書く」→「書かない」は「く」が「か」に変わるから活用する。「犬」→「犬ない」とは言わないから活用しない。\n\nSTEP3：自立語で活用する場合 → 言い切りの形を見る\n\nここで見るのは「言い切りの形」、つまり辞書に載っている形です。それがウ段（く、す、つ、る…）で終わるなら動詞。「い」で終わるなら形容詞。「だ」で終わるなら形容動詞。\n\nSTEP4：自立語で活用しない場合 → 何をしている語かを見る\n\n「が」「を」がつけられるなら名詞。動詞等をくわしくする語なら副詞。名詞だけを修飾する語なら連体詞。文と文をつなぐ語なら接続詞。独立して使う語なら感動詞。\n\nSTEP5：付属語の場合\n\n活用する（形が変わる）なら助動詞。活用しない（形が変わらない）なら助詞。\n\n━━━ テストのひっかけに注意 ━━━\n\n⚠️WARN:「きれい」は「い」で終わるのに形容詞ではありません！正しい言い切りは「きれいだ」→「だ」で終わるので形容動詞です。\n\nこれは本当にたくさんの人が間違えるポイントです。「い」で終わるから形容詞だろう、と思ってしまうんですよね。でも「きれいだ」が正式な言い切りで、「だ」で終わるから形容動詞なんです。「嫌い」も同じひっかけです。\n\n⚠️WARN:「大きな」は形容動詞ではありません！連体詞です。\n\n形容動詞なら「大きだ」という言い切りがあるはずですが、そんな日本語は存在しません。だから連体詞です。"}}},"動詞と活用":{"icon":"🏃","color":"#45B7D1","topics":{"動詞とは":{"summary":"動きや存在を表す文の中心の語","tables":[],"explanation":"━━━ そもそも動詞って何？ ━━━\n\n🎯GOAL:動詞の特徴を覚えて「これは動詞だ」と見分けられるようになりましょう。\n\n動詞は「動き」や「存在」を表す言葉です。「走る」「食べる」「書く」「泳ぐ」「いる」「ある」…こういった言葉がぜんぶ動詞です。\n\n「動詞」の「動」は「うごき」。動きを表す詞（ことば）だから「動詞」。わかりやすい名前ですよね。ただ面白いことに「いる」「ある」のような「じっとしている（存在する）」言葉も動詞に含まれます。動かないのに動詞。ちょっと不思議ですよね。\n\n動詞は文のエンジンのような存在です。「鳥が飛ぶ」の「飛ぶ」を取ったら「鳥が」だけで、何を言いたいのかわかりませんよね。\n\n━━━ 動詞を見分ける3つの特徴 ━━━\n\n💡POINT:① 言い切りの形が「ウ段の音」で終わります。\n\n「ウ段」とは五十音の「う」の列のことです。「く」「す」「つ」「む」「る」…ぜんぶウ段です。書「く」、走「る」、泳「ぐ」→ぜんぶウ段で終わっています。\n\n💡POINT:② 「ない」をつけると形が変わります。\n\n書く→書「か」ない。「く」が「か」に変わりました。こうやって形が変わることを「活用する」と言います。\n\n💡POINT:③ 文の中で述語になれます。\n\n「鳥が飛ぶ。」の「飛ぶ」は述語ですね。このように動詞は文末で述語として使えます。\n\n🔑KEY:言い切りがウ段＋「ない」で形が変わる＋述語になれる → 動詞"},"6つの活用形":{"summary":"後ろにつく語で活用形が決まる","tables":[{"title":"📝 6つの活用形","headers":["活用形","後ろにつく語","例（書く）"],"color":"#45B7D1","rows":[["未然形","ない・う・よう","書か＋ない"],["連用形","ます・た・て","書き＋ます"],["終止形","。（文末）","書く。"],["連体形","名詞（とき等）","書く＋とき"],["仮定形","ば","書け＋ば"],["命令形","命令の言い切り","書け！"]]}],"explanation":"━━━ そもそも「活用形」って何？ ━━━\n\n「活用」という言葉は難しそうに聞こえますが、やっていることはとてもシンプルです。「後ろにつく言葉に合わせて、動詞の形が変わること」、これが活用です。\n\nたとえば「書く」。後ろに「ない」をつけると「書かない」、「ます」をつけると「書きます」。「く」が「か」になったり「き」になったりしていますよね。この変化が活用です。\n\nそして、変化したそれぞれの形に名前がついています。「書かない」のときの形は「未然形」、「書きます」のときの形は「連用形」…という具合です。この名前が「活用形」で、全部で6つあります。\n\nちなみに活用形の名前には意味があります。「未然形」の「未然」は「まだそうなっていない」。「書かない」→まだ書いていない状態ですよね。「連用形」の「連用」は「用言に連なる（つながる）」。「書きます」の「ます」は助動詞（用言の仲間）で、それにつながる形です。「連体形」の「連体」は「体言（名詞）に連なる」。「書くとき」の「とき」は名詞で、それにつながる形。名前と意味をセットで覚えると、試験のときに思い出しやすいですよ。\n\n━━━ テストの解き方 ━━━\n\nテストで「下線部の活用形を答えなさい」と出たら、実はすごく簡単です。\n\n🔑KEY:後ろにある言葉を見るだけで活用形がわかります！\n\n「ない」「う」「よう」が後ろにあれば未然形。「ます」「た」「て」なら連用形。「。」で文が終わっていれば終止形。名詞が後ろにあれば連体形。「ば」なら仮定形。命令で言い切っていれば命令形。\n\nつまり、その語自体を難しく考える必要はなくて、後ろの語を見ればいいんです。「後ろを見る」。これだけ覚えておけば大丈夫です。"},"五段・上一段・下一段活用":{"summary":"3つの活用パターンの見分け方","tables":[{"title":"🔍 見分け方","headers":["「ない」の前","種類","例"],"color":"#45B7D1","rows":[["ア段","五段活用","書「か」ない"],["イ段","上一段活用","「み」ない"],["エ段","下一段活用","食「べ」ない"]]},{"title":"📊 活用比較","headers":["","未然","連用","終止","連体","仮定","命令"],"color":"#3498DB","rows":[["書く(五段)","書か","書き","書く","書く","書け","書け"],["見る(上一段)","み","み","みる","みる","みれ","みろ"],["食べる(下一段)","食べ","食べ","食べる","食べる","食べれ","食べろ"]]}],"explanation":"━━━ そもそもこの単元って何？ ━━━\n\n🎯GOAL:動詞の活用パターン（五段・上一段・下一段）を見分けましょう。テスト超頻出です。\n\n動詞はぜんぶ活用する（形が変わる）のですが、変わり方にパターンがあります。ここでは基本の3パターンを学びます。\n\n━━━ 見分けの神ルール ━━━\n\nやり方はめちゃくちゃシンプルです。\n\n📝RULE:動詞に「ない」をつけて、「ない」の直前の音がどの段かを見る。それだけ！\n\n実際にやってみましょう。\n\n「書く」→書「か」ない→「か」は五十音でア段→五段活用\n「見る」→「み」ない→「み」はイ段→上一段活用\n「食べる」→食「べ」ない→「べ」はエ段→下一段活用\n\n「ない」をつけて直前の音を見るだけ。たったこれだけで、どの活用か一発でわかります。まとめると：\n\n「ない」の直前がア段（あ・か・さ・た・な…）なら五段活用。\n\n🔑KEY:ア段→五段活用\n\n直前がイ段（い・き・し・ち・に…）なら上一段活用。\n\n🔑KEY:イ段→上一段活用\n\n直前がエ段（え・け・せ・て・ね…）なら下一段活用。\n\n🔑KEY:エ段→下一段活用\n\n名前の由来も知っておくと覚えやすいです。「五段」は活用語尾が五十音の5つの段にわたるから。「上一段」は「イ」が「ウ」の1つ上にあるから。「下一段」は「エ」が「ウ」の1つ下にあるから。名前にちゃんと理由があるんですね。\n\n━━━ 紛らわしい動詞に注意 ━━━\n\n⚠️WARN:「〜る」で終わる動詞は紛らわしいものが多いです。必ず「ない」で確認してください。\n\n「走る」→走「ら」ない→ア段→五段です（上一段じゃない！）\n「切る」→切「ら」ない→ア段→五段です\n「帰る」→帰「ら」ない→ア段→五段です\n\n見た目だけで判断すると間違えます。面倒でも「ない」をつけて確認する。これが一番確実です。"},"カ変・サ変（変格活用）":{"summary":"特別ルールの動詞は2つだけ","tables":[{"title":"📊 変格活用","headers":["","未然","連用","終止","連体","仮定","命令"],"color":"#E67E22","rows":[["来る(カ変)","こ","き","くる","くる","くれ","こい"],["する(サ変)","し/さ/せ","し","する","する","すれ","しろ"]]}],"explanation":"━━━ そもそもこの単元って何？ ━━━\n\n🎯GOAL:「来る」と「する」の特別な活用を覚えましょう。この2つで動詞は完成です！\n\n五段・上一段・下一段は「ない」をつけて規則的に見分けられましたよね。でも「来る」と「する」だけは、そのルールに当てはまらない特別な変化をします。\n\n「変格」の「変」は「変則＝イレギュラー」という意味です。英語でもgoの過去形がgoedではなくwentになりますよね。日本語にも不規則な動詞があるんです。\n\n💡POINT:でも安心してください。不規則なのはたった2つだけ。「来る」と「する」。この2つを丸暗記すれば完了です。\n\n━━━ カ変＝「来る」だけ！ ━━━\n\n活用が「こ・き・くる・くる・くれ・こい」。音がバラバラですよね。だからルールに当てはまらず「変格」なんです。\n\n━━━ サ変＝「する」と「〜する」 ━━━\n\n「する」「勉強する」「運動する」がサ変です。\n\n⚠️WARN:未然形が「し・さ・せ」と3通りもあるのが特徴です。普通は1つなのに3つもあるのはイレギュラーです。\n\n📝RULE:まず「来る」か「する」系かを確認。どちらでもなければ「ない」をつけて五段・上一段・下一段を判断。この順番ですべての動詞を見分けられます。"}}},"形容詞・形容動詞":{"icon":"✨","color":"#96CEB4","topics":{"形容詞とは・活用":{"summary":"「〜い」で終わる性質や状態の語","tables":[{"title":"📊 形容詞の活用「高い」","headers":["未然","連用","終止","連体","仮定","命令"],"color":"#96CEB4","rows":[["高かろ","高く\n高かっ","高い","高い","高けれ","なし"]]},{"title":"⚠️ 形容詞じゃない！","headers":["語","正体","理由"],"color":"#E74C3C","rows":[["きれい","形容動詞","「きれいだ」が言い切り"],["嫌い","形容動詞","「嫌いだ」が言い切り"]]}],"explanation":"━━━ そもそも形容詞って何？ ━━━\n\n形容詞は「性質」「状態」「気持ち」を表す言葉です。「どんな？」と聞かれたときの答えになる語ですね。「高い山」→山がどんな？→高い！ 「楽しい日」→どんな日？→楽しい！\n\n「形容」の「容」は「すがた」の意味です。ものの「姿かたちを形で表す」言葉だから「形容詞」。見た目や状態を言い表す言葉、というイメージです。\n\n一番のポイントは、言い切りの形が「〜い」で終わること。美しい、高い、楽しい、赤い…ぜんぶ「い」で終わっていますよね。\n\n活用で覚えておいてほしいのは2つ。連用形が「高く」と「高かっ」の2種類あること。そして命令形がないこと。「高け！」とは言わないですよね。\n\n━━━ テスト最大のひっかけ ━━━\n\n⚠️WARN:「きれい」は「い」で終わりますが形容詞ではありません！\n\nこれ、テストで一番多い間違いです。「い」で終わるから形容詞だろう、とみんな思ってしまうんです。でも「きれい」の正しい言い切りは「きれいだ」。「だ」で終わるので形容動詞です。\n\n迷ったら「〜だ」をつけてみてください。「高いだ」→変ですよね→形容詞。「きれいだ」→自然ですよね→形容動詞。この方法で確実に見分けられます。「嫌い」も同じひっかけなので気をつけてくださいね。"},"形容動詞とは・活用":{"summary":"「〜だ」で終わる性質や状態の語","tables":[{"title":"📊 形容動詞の活用「静かだ」","headers":["未然","連用","終止","連体","仮定","命令"],"color":"#82E0AA","rows":[["静かだろ","静かで\n静かだっ\n静かに","静かだ","静かな","静かなら","なし"]]},{"title":"🔍 形容詞vs形容動詞","headers":["","形容詞","形容動詞"],"color":"#96CEB4","rows":[["言い切り","〜い","〜だ"],["名詞の前","高い山","静かな夜"]]}],"explanation":"━━━ そもそも形容動詞って何？ ━━━\n\n形容動詞は形容詞とほぼ同じ役割（ものの性質や状態を表す）ですが、言い切りの形が違います。形容詞は「〜い」で終わりますが、形容動詞は「〜だ」で終わります。「静かだ」「元気だ」「きれいだ」「好きだ」→ぜんぶ「だ」で終わっていますよね。\n\n「形容動詞」って変な名前ですよね。「形容詞なの？動詞なの？どっち？」と思いませんか。実はこれ、「形容詞のように性質を表すけど、動詞っぽい活用をする語」という意味なんです。形容詞と動詞のハーフみたいな存在ですね。\n\nもう1つの特徴は、名詞の前で「〜な」の形になること。「静かな夜」「元気な子」「きれいな花」。形容詞は「高い山」のように「〜い」のまま名詞につきますが、形容動詞は「〜な」に変わります。\n\n⚠️WARN:「大きな」は形容動詞ではなく連体詞です！「大きだ」は日本語に存在しないからです。「〜な」を「〜だ」に変えて自然なら形容動詞、不自然なら連体詞。この方法で100%見分けられます。"}}},"名詞（体言）":{"icon":"📛","color":"#DDA0DD","topics":{"名詞の種類と特徴":{"summary":"もの・ことの名前を表す語","tables":[{"title":"📋 名詞の種類","headers":["種類","意味","例"],"color":"#DDA0DD","rows":[["普通名詞","一般的な名前","山、犬、学校"],["固有名詞","特定の名前","東京、富士山"],["数詞","数や量","一つ、三人"],["代名詞","指し示す語","私、これ"],["形式名詞","形式的に使う","こと、もの"]]}],"explanation":"━━━ そもそも名詞って何？ ━━━\n\n🎯GOAL:名詞の特徴と「体言」の意味を覚えましょう。\n\n名詞は、もの・こと・人の「名前」を表す言葉です。「犬」「学校」「夢」「東京」「私」…ぜんぶ名詞です。10品詞の中で圧倒的に数が多い品詞ですね。\n\n━━━ 「体言」の意味を知ろう ━━━\n\n⚠️WARN:名詞の別名「体言（たいげん）」は、このあと何十回も出てきます！今のうちに覚えましょう。\n\n🔑KEY:「体言って何？」→「名詞のこと！」\n\nでも、なぜ「体言」という名前なのでしょう？\n\n「体」は「本体・実体」の意味です。「犬」「山」「学校」…名詞はものの本体そのものを指していますよね。ものの実体を表す言葉だから「体言」なんです。\n\n💡POINT:セットで「用言」も覚えましょう。「用」は「はたらき」。動詞・形容詞・形容動詞はたらきを表すから「用言」です。\n\nこのあと「連体形」「連体修飾語」が出てきますが、「体」はぜんぶ「体言＝名詞」の「体」です。名前の意味がわかると文法がグッとわかりやすくなりますよ。"}}},"副詞・連体詞":{"icon":"🎯","color":"#F7DC6F","topics":{"副詞とは":{"summary":"用言をくわしくする、活用しない語","tables":[{"title":"★ 呼応の副詞（丸暗記！）","headers":["副詞","文末","関係"],"color":"#F39C12","rows":[["もし","〜ば・たら","仮定"],["決して","〜ない","打消し"],["全然","〜ない","打消し"],["めったに","〜ない","打消し"],["たぶん","〜だろう","推量"],["まるで","〜ようだ","比喩"],["なぜ","〜か","疑問"]]}],"explanation":"━━━ そもそも副詞って何？ ━━━\n\n副詞は、動詞や形容詞を「くわしくする」言葉です。「ゆっくり歩く」の「ゆっくり」、「とても暑い」の「とても」が副詞です。\n\n「副」は「サブ」の意味。メインの動詞や形容詞を横からサポートする「サブ的な言葉」だから「副詞」です。脇役みたいな存在ですが、ないと文が味気なくなります。「走った」と「ものすごく速く走った」だと全然印象が違いますよね。\n\n━━━ テストで一番出る「呼応の副詞」 ━━━\n\n副詞にはいくつか種類がありますが、テストで一番出るのは「呼応の副詞」です。\n\n「呼応」は「呼びかけて応える」という意味です。特定の副詞と特定の文末がいつもセットで登場するんですね。まるでコンビ芸人のように、いつも一緒に出てきます。\n\n⚠️WARN:上の表を丸暗記してください！\n\nたとえば「決して忘れ（　）。」という穴埋め問題が出たとします。「決して」を見た瞬間に答えは「ない」です。「決して」と「ない」はいつもセットだからです。\n\n「まるで夢の（　）。」なら？「まるで」のコンビ相手は「ようだ」。答えは「ようだ」です。\n\nこのセットを覚えておくと確実に点が取れるおいしい問題です。ぜひ丸暗記してくださいね。"},"連体詞とは":{"summary":"名詞だけを修飾する、活用しない語","tables":[{"title":"📋 連体詞一覧","headers":["型","連体詞"],"color":"#F7DC6F","rows":[["〜の型","この、その、あの、どの"],["〜な型","大きな、小さな、おかしな"],["〜る型","ある（ある日）、あらゆる"],["〜た型","たいした、とんだ、たった"]]}],"explanation":"━━━ そもそも連体詞って何？ ━━━\n\n🎯GOAL:連体詞を覚えて、形容動詞との見分けができるようになりましょう。\n\n連体詞は名詞の前にしか来ない「名詞専用の修飾語」です。「この本」「あの人」「大きな犬」の「この」「あの」「大きな」が連体詞です。\n\n「連体詞」の「連体」は「体言（名詞）に連なる」。名詞にしかくっつけない（連なれない）から「連体詞」。名前のとおりですね。\n\n数がとても少ないので、ぜんぶ丸暗記してしまうのが一番早いです。上の表にあるものがほぼ全部。「この、その、あの、どの、大きな、小さな…」と何回か唱えれば覚えられます。\n\n━━━ 最大のひっかけ ━━━\n\n⚠️WARN:テストで「大きな」を形容動詞と答える間違いが非常に多いです。\n\n形容動詞なら「大きだ」という言い切りがあるはずですが、そんな日本語はありません。だから連体詞です。\n\n📝RULE:迷ったら「〜な」を「〜だ」に変えてみてください。\n\n「大きだ」→ 不自然ですよね → 形容動詞ではない → 連体詞です。\n\n🔑KEY:「〜だ」にして不自然→連体詞\n\n「静かだ」→ 自然ですよね → 形容動詞です。\n\n🔑KEY:「〜だ」にして自然→形容動詞\n\nこの方法を使えば、連体詞と形容動詞は100%見分けられます。"}}},"接続詞・感動詞":{"icon":"🔗","color":"#E8A87C","topics":{"接続詞の種類":{"summary":"文と文をつなぐ6種類の接続詞","tables":[{"title":"📋 6種類の接続詞","headers":["種類","意味","代表語"],"color":"#E8A87C","rows":[["順接","当然の結果","だから、したがって"],["逆接","予想と逆","しかし、ところが"],["並列・累加","付け足し","また、そして"],["対比・選択","比べる・選ぶ","または、あるいは"],["説明・補足","まとめ・理由","つまり、なぜなら"],["転換","話題チェンジ","さて、ところで"]]}],"explanation":"━━━ そもそも接続詞って何？ ━━━\n\n🎯GOAL:6種類の接続詞を覚えましょう。穴埋め問題も読解問題も得意になります。\n\n接続詞は文と文をつなぐ「つなぎ言葉」です。「接続」は「つなぐ」の意味ですね。\n\n💡POINT:接続詞は読解問題でも大活躍します。「しかし」の後ろには筆者の一番言いたいことが来ることが多いです。「つまり」の後ろにはまとめが来ます。文法と読解の一石二鳥です。\n\n━━━ テストの解き方 ━━━\n\n📝RULE:前の文と後ろの文の関係を考えましょう。\n\n例：「勉強した。（　）不合格だった。」\n\n勉強した→ふつうは合格する→でも不合格→予想と逆の結果→逆接→「しかし」！\n\nこのように前後の関係がわかれば接続詞を選べます。上の表の6種類をしっかり覚えておいてくださいね。"},"感動詞とは":{"summary":"感動・呼びかけ・応答を表す語","tables":[{"title":"📋 感動詞の種類","headers":["種類","例"],"color":"#E8A87C","rows":[["感動","ああ、おお"],["呼びかけ","おい、ねえ"],["応答","はい、いいえ"],["あいさつ","こんにちは"],["かけ声","えいっ、よいしょ"]]}],"explanation":"━━━ そもそも感動詞って何？ ━━━\n\n🎯GOAL:感動詞の見分け方を覚えましょう。\n\n感動詞は気持ちや呼びかけを表す独立した言葉です。「ああ」「おーい」「はい」「こんにちは」…こういう言葉です。\n\n💡POINT:「感動詞」は「感動したときに思わず出る言葉」から名付けられました。「ああ！」「おお！」って考えなくても口から出ますよね。\n\nちなみに「はい」「こんにちは」も感動詞に含まれます。「感動」していないのに感動詞って変ですよね。もともとは感動を表す語だけだったのが、あとから「呼びかけ」「応答」「あいさつ」も含めるようになったんです。\n\n━━━ 見分け方 ━━━\n\n📝RULE:取り除いても文が成立するかどうかで見分けられます。\n\n例：「ああ、きれいだ。」→「ああ」を取っても「きれいだ」で通じる→感動詞 ✅"}}},"助動詞":{"icon":"🧩","color":"#C39BD3","topics":{"助動詞の一覧と接続":{"summary":"用言の後ろについて意味を足す語","tables":[{"title":"📋 接続ルール","headers":["接続先","助動詞","例"],"color":"#C39BD3","rows":[["未然形","れる・られる","書かれる"],["未然形","せる・させる","書かせる"],["未然形","ない","書かない"],["未然形","う・よう","書こう"],["連用形","た（だ）","書いた"],["連用形","たい","書きたい"],["連用形","そうだ（様態）","降りそうだ"],["終止形","そうだ（伝聞）","降るそうだ"],["終止形","らしい","降るらしい"],["体言","だ（です）","学生だ"]]},{"title":"⚠️「そうだ」2つの意味","headers":["接続","意味","例"],"color":"#E74C3C","rows":[["連用形＋そうだ","様態（〜しそう）","降りそうだ"],["終止形＋そうだ","伝聞（聞いた話）","降るそうだ"]]}],"explanation":"━━━ そもそも助動詞って何？ ━━━\n\n🎯GOAL:助動詞の意味と接続ルールを覚えましょう。\n\n助動詞は動詞などの後ろにくっついて「意味を付け足す」言葉です。\n\n「助動詞」は「動詞を助ける詞」。動詞だけだと「書く」はただの動作。でもそこに助動詞がくっつくと「書かない」（否定）「書かれる」（受身）「書いた」（過去）と、いろんな意味が足されます。\n\n━━━ 接続ルール ━━━\n\n📝RULE:助動詞は「何形の後ろにつくか」が決まっています。\n\n否定の「ない」、受身の「れる」、使役の「せる」、推量の「う・よう」は未然形につきます。\n\n💡POINT:未然形につく助動詞は「まだ起きていないこと」系が多いです。「ない」→していない、「う」→しようかな（まだ）。\n\n過去の「た」、希望の「たい」、様態の「そうだ」は連用形につきます。\n\n💡POINT:連用形につく助動詞は「もう起きたこと」系が多いです。「た」→した（過去）、「たい」→したいと思っている。\n\n伝聞の「そうだ」、推定の「らしい」は終止形につきます。\n\n━━━ 「そうだ」の見分け ━━━\n\n⚠️WARN:「そうだ」は2つの意味がある超頻出問題です。\n\n「降りそうだ」→前の「降り」は連用形→自分の目で見て判断した（様態）。\n\n🔑KEY:連用形＋そうだ＝様態（自分の判断）\n\n「降るそうだ」→前の「降る」は終止形→天気予報で聞いた（伝聞）。\n\n🔑KEY:終止形＋そうだ＝伝聞（人から聞いた）"},"れる・られるの見分け":{"summary":"4つの意味を文脈で見分ける超頻出","tables":[{"title":"🎯 4つの意味","headers":["意味","見分け方","例"],"color":"#8E44AD","rows":[["受身","「〜に…れる」の形","弟に読まれた"],["可能","「できる」に置換OK","生で食べられる"],["尊敬","「お〜になる」に置換OK","先生が来られる"],["自発","「自然と〜してしまう」","故郷が思い出される"]]}],"explanation":"━━━ そもそもこの単元って何？ ━━━\n\n🎯GOAL:「れる・られる」の4つの意味を見分けましょう。テスト超頻出です！\n\n「れる・られる」はまったく同じ形なのに、文によって意味が全然違います。1つの助動詞で4つの意味を持つのは「れる・られる」だけ。文法界の「四刀流」みたいな存在ですね。\n\n━━━ 見分けの手順 ━━━\n\n📝RULE:次の順番で1つずつ確認してください。\n\nまず「〜できる」に置き換えてみます。自然なら「可能」の意味です。\n\n次に、主語が目上の人で「お〜になる」に置き換えて自然なら「尊敬」。\n\n次に、「思う」「感じる」など心の動詞で「自然とそうなってしまう」感じなら「自発」。\n\nどれにも当てはまらなければ「受身」です。\n\n━━━ 実際にやってみましょう ━━━\n\n💡POINT:「先生が来られる」→できる？→不自然。目上の人？→はい。「お越しになる」→自然！→尊敬です。\n\n💡POINT:「故郷が思い出される」→できる？→不自然。目上？→違う。自然とそうなる？→はい。→自発です。\n\n💡POINT:「弟に本を読まれた」→できる？→不自然。目上？→違う。自然と？→違う。→受身です。\n\n上から順にチェックしていくだけです。慣れると頭の中で一瞬でできるようになりますよ。"}}},"助詞":{"icon":"📌","color":"#85C1E9","topics":{"格助詞":{"summary":"名詞の後ろにつく10個の助詞","tables":[{"title":"📋 格助詞10個","headers":["助詞","役割","例"],"color":"#85C1E9","rows":[["が","主語","犬が走る"],["を","目的語","本を読む"],["に","場所・時","学校に行く"],["で","場所・手段","公園で遊ぶ"],["と","相手","友達と遊ぶ"],["から","起点","駅から歩く"],["まで","終点","学校まで"],["へ","方向","東へ向かう"],["の","修飾","私の本"],["より","比較","兄より高い"]]}],"explanation":"━━━ そもそも助詞って何？ ━━━\n\n🎯GOAL:助詞の中でも「格助詞」の10個を覚えましょう。\n\n助詞は言葉と言葉をつなぐ「接着剤」のような存在です。\n\nたった1文字なのに、助詞が変わるだけで文の意味がガラッと変わります。「犬が走る」「犬と走る」→全然違いますよね。\n\n💡POINT:「格助詞」の「格」は「資格」の「格」です。名詞にどんな役割を与えるかを決めます。「犬が走る」の「が」は「犬」に「主語」という資格を与えています。\n\n📝RULE:格助詞は全部で10個。「が・を・に・で・と・から・まで・へ・の・より」。声に出して覚えましょう。\n\n━━━ テストに出るポイント ━━━\n\n⚠️WARN:「に」と「で」の違いがよく聞かれます。\n\n「教室にいる」→「に」は存在する場所（じっといるイメージ）。\n\n🔑KEY:「に」＝存在の場所（じっといる）\n\n「教室で勉強する」→「で」は動作をする場所（何かするイメージ）。\n\n🔑KEY:「で」＝動作の場所（何かする）"},"接続助詞":{"summary":"活用語の後ろについて文節をつなぐ","tables":[{"title":"📋 接続助詞","headers":["種類","助詞","例"],"color":"#85C1E9","rows":[["順接","ので、から、て","降ったので傘をさした"],["逆接","のに、が、けれど","勉強したのに不合格"],["仮定","ば、と、たら","降れば中止"],["並立","たり、し、ながら","歌ったり踊ったり"]]}],"explanation":"━━━ そもそもこの単元って何？ ━━━\n\n🎯GOAL:接続助詞と接続詞の違いを覚えましょう。\n\n接続助詞は動詞などの活用語の後ろにくっついて、前後をつなぐ助詞です。\n\n━━━ 接続詞との違い ━━━\n\n⚠️WARN:「接続詞」と「接続助詞」は名前が似ていますが別物です！\n\n接続詞は自立語で、文の頭にひとりで立てます。「しかし、出かけた。」の「しかし」は文頭にありますよね。\n\n接続助詞は付属語で、動詞にくっつかないと使えません。「降ったが、出かけた。」の「が」は「降った」にくっついています。\n\n🔑KEY:接続詞＝自立語。文頭にひとりで立つ。\n\n🔑KEY:接続助詞＝付属語。動詞の後ろにくっつく。\n\n━━━ テストに出やすいポイント ━━━\n\n💡POINT:「から」は2つの品詞になれます。前にある語が名詞なら格助詞、活用語なら接続助詞です。\n\n「東京から歩く」→名詞「東京」＋から＝格助詞（起点の意味）\n「寒いから上着を着る」→形容詞「寒い」＋から＝接続助詞（理由の意味）"},"副助詞・終助詞":{"summary":"意味を添える副助詞、文末の終助詞","tables":[{"title":"📋 主な副助詞","headers":["助詞","意味","例"],"color":"#5DADE2","rows":[["は","主題","私は学生です"],["も","添加","私も学生です"],["こそ","強調","今こそ頑張ろう"],["しか","限定＋打消し","100円しかない"],["だけ","限定","一人だけ来た"]]},{"title":"📋 主な終助詞","headers":["助詞","意味","例"],"color":"#AF7AC5","rows":[["か","疑問","行くか？"],["な","感動","きれいだな"],["ね","確認","いい天気ですね"],["よ","主張","帰るよ"]]}],"explanation":"━━━ そもそもこの単元って何？ ━━━\n\n🎯GOAL:副助詞と終助詞を覚えて、助詞4種類を見分けましょう。\n\n格助詞、接続助詞のほかに、あと2種類の助詞があります。「副助詞」と「終助詞」です。これで助詞は全部で4種類になります。\n\n「副助詞」の「副」は「サブ」の意味。メインの意味にサブ的な意味を添える助詞です。「終助詞」は文の「終わり」にくる助詞。「〜か？」「〜ね」「〜よ」のように文末で気持ちを表します。\n\n━━━ 最重要ポイント ━━━\n\n⚠️WARN:「は」は格助詞ではありません！副助詞です！テストで最も多い間違いです。\n\n「が」と「は」は似た使い方をしますが品詞が違います。\n\n「犬が走る」の「が」は格助詞です。「犬」に「主語」という役割を与えています。\n\n🔑KEY:「犬が走る」の「が」＝格助詞\n\n一方、「犬は走る」の「は」は副助詞です。「犬」に役割を与えるのではなく「これから犬について話しますよ」と話題を示しています。\n\n🔑KEY:「犬は走る」の「は」＝副助詞\n\nもうひとつ覚えておいてほしいのが「しか」です。\n\n💡POINT:「しか」の後ろには必ず「ない」が来ます。「100円しかない」。「しか」と「ない」はいつもセットです。テストで穴埋め問題として出ることがあります。\n\n━━━ 助詞4種類の見分け方 ━━━\n\n助詞は4種類ありますが、それぞれ「どこにつくか」と「何をしているか」が違います。ひとつずつ見ていきましょう。\n\nまず「格助詞」。これは名詞の後ろにつく10個の助詞です。「が」「を」「に」「で」「と」「から」「まで」「へ」「の」「より」。名詞にどんな役割を与えるかを決める助詞でしたよね。「犬が走る」の「が」は名詞「犬」の後ろについて、主語の役割を与えています。\n\n📝RULE:名詞の後ろにつく＋10個のどれか→格助詞\n\n次に「接続助詞」。これは動詞などの活用語の後ろにくっついて、前後の文節をつなぐ助詞です。「降ったので傘をさした」の「ので」は動詞「降った」の後ろについて、原因と結果をつないでいます。\n\n📝RULE:活用語の後ろにつく＋前後をつなぐ→接続助詞\n\n次に「副助詞」。これはいろいろな語につけて、意味を添える助詞です。「は」「も」「こそ」「しか」「だけ」など。名詞にも動詞にもいろいろな語につけられるのが特徴です。「私は」「走りもする」「これだけ」のように使います。\n\n📝RULE:いろいろな語につく＋意味を添える→副助詞\n\n最後に「終助詞」。文の最後にくっついて、話し手の気持ちを表す助詞です。「行くか？」「きれいだな」「いい天気ですね」「帰るよ」のように文末で使います。\n\n📝RULE:文末にくる＋気持ちを表す→終助詞\n\nテストで助詞の種類を聞かれたら、まず「どこについているか」を見てください。名詞の後ろで10個のどれかなら格助詞。活用語の後ろで前後をつないでいれば接続助詞。文末にあれば終助詞。どれでもなければ副助詞。この順番で考えると見分けやすいですよ。"}}},"敬語":{"icon":"🎩","color":"#F1948A","topics":{"敬語の3種類":{"summary":"尊敬語・謙譲語・丁寧語のしくみ","tables":[{"title":"📋 特別な敬語（丸暗記！）","headers":["元の語","尊敬語","謙譲語"],"color":"#E74C3C","rows":[["いる","いらっしゃる","おる"],["行く・来る","いらっしゃる","参る・伺う"],["言う","おっしゃる","申す"],["食べる・飲む","召し上がる","いただく"],["見る","ご覧になる","拝見する"],["知る","ご存じだ","存じる"],["する","なさる","いたす"],["くれる","くださる","—"],["もらう","—","いただく"]]}],"explanation":"━━━ そもそも敬語って何？ ━━━\n\n🎯GOAL:3種類の敬語のしくみと特別な敬語を覚えましょう。\n\n敬語は相手への敬意を示すための言葉遣いです。テストにも出ますし、社会に出てからも一生使います。\n\n「敬語」の「敬」は「うやまう」。相手をうやまう言葉だから「敬語」。日本語には相手を大切に思う気持ちを言葉で表す文化があるんですね。\n\n━━━ 3つのしくみ ━━━\n\n敬語は3種類あります。エレベーターをイメージするとわかりやすいです。\n\n尊敬語は相手を上の階に押し上げるボタン。\n謙譲語は自分を下の階に下げるボタン。\n丁寧語はエレベーター全体をきれいにすること（です・ます）。\n\nどちらのボタンを押しても「相手が上・自分が下」になりますよね。「尊敬」は「相手をとうとぶ」、「謙譲」は「自分をへりくだる」。漢字の意味そのままです。\n\n━━━ 一番大事なルール ━━━\n\n敬語の問題を解くとき、一番大切なのは「その動詞はだれの動作か？」を確認することです。\n\n相手がやっている動作なら、尊敬語を使って相手を持ち上げます。\n\n🔑KEY:相手の動作→尊敬語を使う\n\n自分がやっている動作なら、謙譲語を使って自分を下げます。\n\n🔑KEY:自分の動作→謙譲語を使う\n\nこの2つのルールが敬語の基本中の基本です。迷ったら「だれの動作か？」を確認してください。\n\n⚠️WARN:「だれの動作か」を確認すること。これがすべての敬語問題を解くカギです。逆に、これさえ間違えなければ大半の敬語問題は正解できます。\n\n上の表の特別な敬語はぜひ丸暗記してください。テストにとてもよく出ます。"},"敬語の間違いと注意点":{"summary":"よくある間違いパターン","tables":[{"title":"❌ よくある間違い","headers":["間違い","正しい","理由"],"color":"#E74C3C","rows":[["先生が申された","先生がおっしゃった","申す＝謙譲語"],["私がいらっしゃる","私がおります","いらっしゃる＝尊敬語"],["お読みになられる","お読みになる","二重敬語"],["母がおっしゃった","母が申しておりました","身内に尊敬語NG"]]}],"explanation":"━━━ そもそもこの単元って何？ ━━━\n\n🎯GOAL:よくある間違いパターンを知ってひっかからないようにしましょう。\n\nテストでは「正しい敬語を選べ」「間違いを見つけよ」がよく出ます。よくある間違いパターンを知っておくと、グッと解きやすくなります。\n\n━━━ 間違い① 尊敬語と謙譲語の取り違え ━━━\n\n⚠️WARN:これが一番多い間違いです！\n\n❌「先生が申された」\n\n「申す」は自分を下げる謙譲語です。でもここでは先生（相手）の動作に使ってしまっています。相手の動作には尊敬語を使わないといけません。\n\n⭕「先生がおっしゃった」\n\n「おっしゃる」が尊敬語です。相手を上げる言葉なので、先生の動作に使えます。\n\n💡POINT:なぜこの間違いが多いかというと、「申す」のほうが「おっしゃる」より丁寧っぽく聞こえるからです。でも丁寧さの問題ではなく「だれの動作か」の問題なんですね。\n\n📝RULE:まず「だれの動作か」を確認する。これが鉄則です。\n\n━━━ 間違い② 二重敬語 ━━━\n\n丁寧にしようとして敬語を2つ重ねてしまう間違いです。\n\n❌「お読みになられる」\n\nこれは「お〜になる」と「〜られる」の2つの尊敬語が重なっています。\n\n⭕「お読みになる」\n\n💡POINT:敬語は1つで十分です。2つ重ねるとかえって不自然になります。\n\n━━━ 間違い③ 身内に尊敬語 ━━━\n\n外の人に対して話すとき、自分の身内に尊敬語を使ってしまう間違いです。\n\n❌（電話で）「母がおっしゃっていました」\n\n「おっしゃる」は尊敬語です。自分の身内（母）に尊敬語を使うのはNGです。\n\n⭕「母が申しておりました」\n\n📝RULE:外の人に話すとき、身内の動作には謙譲語を使います。\n\n━━━ テストの解き方 ━━━\n\n敬語の間違い問題は、次の5つをチェックすれば解けます。\n\nSTEP1：だれの動作かを確認する\nSTEP2：相手の動作なら尊敬語になっているか？\nSTEP3：自分の動作なら謙譲語になっているか？\nSTEP4：二重敬語になっていないか？\nSTEP5：身内に尊敬語を使っていないか？\n\n⚠️WARN:迷ったらSTEP1に戻ってください。「だれの動作か」さえ間違えなければ、大半の敬語問題は正解できます。"}}},"文法の応用":{"icon":"🔬","color":"#AED6F1","topics":{"文の種類":{"summary":"単文・重文・複文の見分け方","tables":[{"title":"📋 文の構造","headers":["種類","しくみ","例"],"color":"#AED6F1","rows":[["単文","主述が1組","花が咲く。"],["重文","2組以上が対等","風が吹き、雨が降る。"],["複文","入れ子","【花が咲く】のを見た。"]]}],"explanation":"━━━ そもそもこの単元って何？ ━━━\n\n🎯GOAL:文の構造（単文・重文・複文）を見分けましょう。\n\n文は構造によって3種類に分けられます。やることは「主語＋述語のセットがいくつあるか」を数えるだけです。\n\n「単文」の「単」は「ひとつ」。主述が1組だけのシンプルな文です。\n\n例：「花が咲く。」→「花が＋咲く」＝1組\n\n🔑KEY:1組→単文\n\n「重文」の「重」は「重なる」。主述のセットが2組以上あって、対等に並んでいる文です。\n\n例：「風が吹き、雨が降る。」→「風が吹く」と「雨が降る」の2組が対等\n\n🔑KEY:2組以上で対等→重文\n\n「複文」の「複」は「複雑」の「複」。主述が2組以上あって、一方がもう一方の中に入れ子になっています。\n\n例：「【花が咲く】のを見た。」→「花が咲く」が「見た」の中に組み込まれている\n\n🔑KEY:2組以上で入れ子→複文\n\nテストで聞かれたら、まず主述のセットを数えましょう。1組なら単文。2組以上あれば、対等に並んでいるか（重文）、入れ子になっているか（複文）を判断します。"},"紛らわしい語の識別":{"summary":"同じ形で品詞が違う超頻出問題","tables":[{"title":"🎯「ない」の識別","headers":["種類","見分け方","例"],"color":"#3498DB","rows":[["助動詞","「ぬ」に置換OK","行かない→行かぬ"],["形容詞","「ぬ」に置換NG","お金がない"],["語の一部","取ると意味なし","せつない"]]},{"title":"🎯「の」の識別","headers":["種類","意味","例"],"color":"#27AE60","rows":[["格助詞","名詞つなぐ","私の本"],["準体助詞","名詞の代わり","赤いのがいい"],["終助詞","疑問","行くの？"]]}],"explanation":"━━━ そもそもこの単元って何？ ━━━\n\n🎯GOAL:「ない」「の」「だ」など、同じ形で品詞が違う語を見分けましょう。テストで最も差がつく問題です。\n\n日本語って同音異義語が多い言語ですよね。「はし」が「箸」にも「橋」にもなるように、文法でも同じ形で品詞が違う語がたくさんあります。ここが得意になると周りと大きな差がつけられます。\n\n━━━ 「ない」の見分け方 ━━━\n\n「ない」には3種類あります。見分けるには「ぬ」に置き換えてみてください。\n\nなぜ「ぬ」かというと、「ぬ」も「ない」と同じ打消しの助動詞だからです。助動詞どうしなら入れ替えても自然ですが、形容詞の「ない」は別物なので「ぬ」だと不自然になるんですね。\n\nまず「行かない」。「行かぬ」に置き換えると自然ですよね。つまりこの「ない」は助動詞です。\n\n🔑KEY:「ぬ」に置き換えて自然→助動詞\n\n次に「お金がない」。「お金がぬ」だと…おかしいですよね。つまりこの「ない」は助動詞ではなく形容詞です。\n\n🔑KEY:「ぬ」に置き換えて不自然→形容詞\n\n最後に「せつない」。「ない」を取ると「せつ」ですが、これだけでは意味をなしません。つまり「ない」は取り外せない語の一部です。\n\n🔑KEY:「ない」を取ると意味がなくなる→語の一部\n\n━━━ テスト攻略法 ━━━\n\nこういう紛らわしい語の問題は、あわてず1つずつ確認すれば必ず正解にたどり着けます。\n\nSTEP1：前後の文脈を確認する\nSTEP2：置き換えテストを試す（「ぬ」「が」など）\nSTEP3：前にある語の品詞を確認する\n\nこの3ステップで考えましょう。がんばってください！"}}}};

const AC=typeof window!=="undefined"?(window.AudioContext||window.webkitAudioContext):null;

const playTap=()=>{try{const c=gc();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.setValueAtTime(800,c.currentTime);o.frequency.exponentialRampToValueAtTime(1200,c.currentTime+.06);g.gain.setValueAtTime(.1,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.08);o.connect(g);g.connect(c.destination);o.start(c.currentTime);o.stop(c.currentTime+.08);}catch(e){}};
const playBack=()=>{try{const c=gc();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.setValueAtTime(600,c.currentTime);o.frequency.exponentialRampToValueAtTime(400,c.currentTime+.07);g.gain.setValueAtTime(.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.07);o.connect(g);g.connect(c.destination);o.start(c.currentTime);o.stop(c.currentTime+.07);}catch(e){}};

function renderLine(l){
  if(l.startsWith("━━━"))return '<div class="line-sec">'+esc(l.replace(/━/g,"").trim())+'</div>';
  if(l.startsWith("🎯GOAL:"))return '<div class="card-goal"><span class="icon">🎯</span><span class="text">'+esc(l.slice(7))+'</span></div>';
  if(l.startsWith("💡POINT:"))return '<div class="card-point"><div class="head">💡 ポイント</div><div class="body">'+esc(l.slice(8))+'</div></div>';
  if(l.startsWith("⚠️WARN:"))return '<div class="card-warn"><div class="head">⚠️ テストに出る！注意</div><div class="body">'+esc(l.slice(7))+'</div></div>';
  if(l.startsWith("🔑KEY:"))return '<div class="card-key">'+esc(l.slice(6))+'</div>';
  if(l.startsWith("📝RULE:"))return '<div class="card-rule"><div class="head">📝 ルール</div><div class="body">'+esc(l.slice(7))+'</div></div>';
  if(l.startsWith("STEP")){const p=l.includes("：")?"：":":";const ps=l.split(p);return '<div class="card-step"><span class="badge">'+esc(ps[0])+'</span><span class="stxt">'+esc((ps[1]||"").trim())+'</span></div>';}
  if(l.startsWith("⚠️"))return '<div class="card-warn2">'+esc(l)+'</div>';
  if(l.startsWith("→"))return '<div class="line-arw">'+esc(l)+'</div>';
  if(l.startsWith("例："))return '<div class="line-ex">'+esc(l)+'</div>';
  if(l.startsWith("❌"))return '<div class="line-ng">'+esc(l)+'</div>';
  if(l.startsWith("⭕")||l.startsWith("✅"))return '<div class="line-ok">'+esc(l)+'</div>';
  if(l.trim()==="")return '<div class="line-spacer"></div>';
  return '<div class="line-nrm">'+esc(l)+'</div>';
}

function renderTable(tb){
  let h='';
  if(tb.title)h+='<div class="tbl-title">'+esc(tb.title)+'</div>';
  h+='<div class="tbl-wrap"><table><thead><tr>';
  tb.headers.forEach(hd=>{h+='<th style="background:'+(tb.color||"#2C3E50")+'">'+esc(hd)+'</th>';});
  h+='</tr></thead><tbody>';
  tb.rows.forEach((r,ri)=>{
    h+='<tr>';r.forEach(c=>{h+='<td>'+esc(c).replace(/\n/g,"<br>")+'</td>';});h+='</tr>';
  });
  h+='</tbody></table></div>';
  return h;
}

function render(){
  const s=state;
  if(s.topic){
    const c=D[s.cat],t=c.topics[s.topic],ns=Object.keys(c.topics),idx=ns.indexOf(s.topic);
    const prev=idx>0?ns[idx-1]:null,next=idx<ns.length-1?ns[idx+1]:null;
    let h='<div class="hdr"><button class="back-btn" onclick="playBack();state.topic=null;render()">← 戻る</button><div class="hdr-title">'+esc(c.icon+" "+s.cat)+'</div></div>';
    h+='<div class="scroll" id="scr">';
    h+='<div class="topic-header" style="background:'+c.color+'12;border-left:4px solid '+c.color+'"><div class="topic-h-name">'+esc(s.topic)+'</div><div class="topic-h-sum">'+esc(t.summary)+'</div></div>';
    if(t.tables&&t.tables.length)t.tables.forEach(tb=>{h+=renderTable(tb);});
    h+='<div class="exp-card">';
    t.explanation.split("\n").forEach(l=>{h+=renderLine(l);});
    h+='</div>';
    h+='<div class="nav-row">';
    if(prev)h+='<button class="nav-btn" onclick="playNav();state.topic=\''+prev.replace(/'/g,"\\'")+'\';render()">← '+(prev.length>10?esc(prev.slice(0,10))+"…":esc(prev))+'</button>';else h+='<div></div>';
    if(next)h+='<button class="nav-btn" style="margin-left:auto" onclick="playNav();state.topic=\''+next.replace(/'/g,"\\'")+'\';render()">'+(next.length>10?esc(next.slice(0,10))+"…":esc(next))+' →</button>';else h+='<div></div>';
    h+='</div></div>';
    app.innerHTML=h;
    document.getElementById("scr").scrollTop=0;
    return;
  }
  if(s.cat){
    const c=D[s.cat];
    let h='<div class="hdr"><button class="back-btn" onclick="playBack();state.cat=null;render()">← メニュー</button><div class="hdr-title">'+esc(c.icon+" "+s.cat)+'</div></div>';
    h+='<div class="scroll" id="scr">';
    Object.entries(c.topics).forEach(([n,t],i)=>{
      h+='<button class="topic-card" onclick="playTap();state.topic=\''+n.replace(/'/g,"\\'")+'\';render()"><div class="topic-left"><div class="topic-num" style="background:'+c.color+'">'+(i+1)+'</div><div style="flex:1;min-width:0"><div class="topic-title">'+esc(n)+'</div><div class="topic-sum">'+esc(t.summary)+'</div></div></div><div class="chev">›</div></button>';
    });
    h+='</div>';
    app.innerHTML=h;
    document.getElementById("scr").scrollTop=0;
    return;
  }
  // Home
  const total=Object.values(D).reduce((s,c)=>s+Object.keys(c.topics).length,0);
  let h='<div class="home-hdr"><div class="logo-row"><span class="logo-icon">📖</span><div><div class="app-title">中学国語文法辞典</div><div class="app-sub">苦手な人のためのやさしい文法リファレンス</div></div></div><div class="badges"><span class="badge">'+Object.keys(D).length+'カテゴリ</span><span class="badge">'+total+'項目</span></div></div>';
  h+='<div class="scroll" id="scr">';
  h+='<div class="search-box"><span style="font-size:14px;opacity:.4">🔍</span><input id="sinp" placeholder="キーワードで検索" oninput="doSearch(this.value)">'+(s.sq?'<button class="clear-btn" onclick="doSearch(\'\')">✕</button>':'')+'</div>';
  if(s.searching){
    h+='<div style="font-size:12px;color:#888;margin-bottom:10px">'+s.sr.length+'件</div>';
    if(!s.sr.length)h+='<div style="text-align:center;color:#999;padding:28px">見つかりませんでした</div>';
    s.sr.forEach(r=>{
      h+='<button class="sr-card" onclick="playTap();state.cat=\''+r.cn.replace(/'/g,"\\'")+'\';state.topic=\''+r.tn.replace(/'/g,"\\'")+'\';doSearch(\'\');render()"><span style="font-size:20px;flex-shrink:0">'+esc(r.icon)+'</span><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700">'+esc(r.tn)+'</div><div style="font-size:11px;color:#999">'+esc(r.cn)+'</div><div style="font-size:12px;color:#777;margin-top:2px">'+esc(r.summary)+'</div></div></button>';
    });
  } else {
    Object.entries(D).forEach(([n,c])=>{
      h+='<button class="cat-card" onclick="playTap();state.cat=\''+n.replace(/'/g,"\\'")+'\';render()"><div class="cat-icon" style="background:'+c.color+'18;border-color:'+c.color+'">'+c.icon+'</div><div style="flex:1;min-width:0"><div class="cat-name">'+esc(n)+'</div><div class="cat-sub">'+esc(Object.keys(c.topics).join(" ／ "))+'</div></div><div class="chev">›</div></button>';
    });
    h+='<div class="footer"><div class="footer-title">JUKEN CAMP 🏕️</div><div class="footer-sub">中学3年間の文法をすべて網羅</div></div>';
  }
  h+='</div>';
  app.innerHTML=h;
  const inp=document.getElementById("sinp");
  if(inp){inp.value=s.sq;inp.focus();}
}

function doSearch(q){
  state.sq=q;
  if(!q.trim()){state.sr=[];state.searching=false;render();return;}
  state.searching=true;
  const r=[];
  Object.entries(D).forEach(([cn,c])=>{
    Object.entries(c.topics).forEach(([tn,t])=>{
      if(tn.includes(q)||t.summary.includes(q)||t.explanation.includes(q))
        r.push({cn,tn,summary:t.summary,icon:c.icon});
    });
  });
  state.sr=r;
  render();
}

render();
</script>
</body>
</html>
